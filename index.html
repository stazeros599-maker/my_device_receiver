<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global Device Receiver Node</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>
    <style>
        body { background-color: #11161A; color: white; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .status-box { padding: 20px; background: #1A2229; border-radius: 8px; display: inline-block; margin-top: 20px; }
        .online { color: #4CAF50; font-weight: bold; }
    </style>
</head>
<body>

<h1>Cloud Device Receiver Terminal</h1>
<div class="status-box">
    <p>Device Name: <span id="devName">Awaiting Configuration...</span></p>
    <p>Cloud Relay Status: <span id="netStatus" style="color: orange;">Connecting to HiveMQ Broker...</span></p>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const deviceId = urlParams.get('id');
    const deviceName = urlParams.get('name');

    if (deviceId && deviceName) {
        document.getElementById('devName').innerText = decodeURIComponent(deviceName);

        // Connect to HiveMQ public broker using WebSockets (port 8000)
        const client = new Paho.MQTT.Client("broker.hivemq.com", Number(8000), "web_client_" + Math.random());

        client.onConnectionLost = (responseObject) => {
            document.getElementById('netStatus').innerText = "Disconnected from cloud broker.";
            document.getElementById('netStatus').style.color = "red";
        };

        client.connect({
            onSuccess: async () => { // 🟢 Changed to 'async' so we can await battery data fetch
                document.getElementById('netStatus').innerText = "Connected! Reading device parameters...";

                // 🟢 NEW FEATURE: Read battery percentage level and charging metrics from the browser
                let batteryLevel = "N/A";
                let isCharging = false;

                if (navigator.getBattery) {
                    try {
                        const battery = await navigator.getBattery();
                        batteryLevel = Math.round(battery.level * 100) + "%";
                        isCharging = battery.charging;
                    } catch (e) {
                        console.log("Battery Status API reading restricted: ", e);
                    }
                }

                // 🟢 UPDATED: Bundle battery and charging indicators inside the JSON structure
                const payload = JSON.stringify({
                    id: deviceId,
                    name: decodeURIComponent(deviceName),
                    battery: batteryLevel,
                    charging: isCharging
                });

                // Publish to the shared global topic path
                const message = new Paho.MQTT.Message(payload);
                message.destinationName = "mydevicefinder/telemetry";
                client.send(message);

                document.getElementById('netStatus').innerText = "GLOBAL CLOUD HANDSHAKE COMPLETE";
                document.getElementById('netStatus').className = "online";
            },
            onFailure: (err) => {
                document.getElementById('netStatus').innerText = "Failed to connect to cloud network.";
                console.error(err);
            }
        });
    }
</script>
</body>
</html>
